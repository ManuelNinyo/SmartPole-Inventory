name: MAUI App CI

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x
        cache: true
        cache-dependency-path: mobile/SmartPole.Inventory.Mobile.sln

    - name: Cache MAUI Workload
      id: cache-maui
      uses: actions/cache@v4
      with:
        path: |
          C:\Program Files\dotnet\sdk-manifests
          C:\Program Files\dotnet\metadata
          C:\Program Files\dotnet\packs
          C:\Program Files\dotnet\library-packs
          C:\Program Files\dotnet\template-packs
        key: ${{ runner.os }}-maui-workload-9.0

    - name: Install MAUI Workload
      if: steps.cache-maui.outputs.cache-hit != 'true'
      run: dotnet workload install maui --ignore-failed-sources

    - name: Restore dependencies
      working-directory: mobile
      run: dotnet restore SmartPole.Inventory.Mobile.sln

    - name: Build Mobile Core
      working-directory: mobile
      run: dotnet build SmartPole.Inventory.MobileCore/SmartPole.Inventory.MobileCore.csproj --configuration Release --no-restore

    - name: Run Mobile Unit Tests
      working-directory: mobile
      run: dotnet test SmartPole.Inventory.UnitTests/SmartPole.Inventory.UnitTests.csproj --configuration Release --no-restore --verbosity normal

    - name: Build Android App
      working-directory: mobile
      run: dotnet build SmartPole.Inventory.App/SmartPole.Inventory.App.csproj --configuration Release --no-restore -f net9.0-android

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: maui-app-android
        path: mobile/SmartPole.Inventory.App/bin/Release/net9.0-android/*.apk
