name: MAUI App CI

on:
  push:
    branches: [ "master", "main" ]
    paths:
      - 'mobile/**'
      - '.github/workflows/maui-app-ci.yml'
  pull_request:
    branches: [ "master", "main" ]
    paths:
      - 'mobile/**'
      - '.github/workflows/maui-app-ci.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x
        cache: true
        cache-dependency-path: mobile/SmartPole.Inventory.Mobile.sln

    - name: Restore Workloads
      working-directory: mobile
      run: dotnet workload restore SmartPole.Inventory.Mobile.sln

    - name: Restore dependencies
      working-directory: mobile
      run: dotnet restore SmartPole.Inventory.Mobile.sln

    - name: Check Formatting
      working-directory: mobile
      run: dotnet format SmartPole.Inventory.Mobile.sln --verify-no-changes --severity warn || true

    - name: Build Mobile Core
      working-directory: mobile
      run: dotnet build SmartPole.Inventory.MobileCore/SmartPole.Inventory.MobileCore.csproj --configuration Release --no-restore

    - name: Run Mobile Unit Tests
      working-directory: mobile
      run: dotnet test SmartPole.Inventory.UnitTests/SmartPole.Inventory.UnitTests.csproj --configuration Release --no-restore --verbosity normal

    - name: Build Android App
      working-directory: mobile
      run: dotnet build SmartPole.Inventory.App/SmartPole.Inventory.App.csproj --configuration Release --no-restore -f net9.0-android

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: maui-app-android
        path: mobile/SmartPole.Inventory.App/bin/Release/net9.0-android/*.apk
