name: Backend CI

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x

    - name: Restore dependencies
      run: dotnet restore src/SmartPole.Inventory.sln

    - name: Build
      run: dotnet build src/SmartPole.Inventory.sln --no-restore

    - name: Test Unit Tests
      run: dotnet test src/SmartPole.Inventory.UnitTests/SmartPole.Inventory.UnitTests.csproj --no-build --verbosity normal

    - name: Publish WebAPI
      run: dotnet publish src/SmartPole.Inventory.WebAPI/SmartPole.Inventory.WebAPI.csproj --configuration Release --no-build --output ./publish

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: backend-app
        path: ./publish
