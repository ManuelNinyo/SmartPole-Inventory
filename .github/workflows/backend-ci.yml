name: Backend CI

on:
  push:
    branches: [ "master", "main" ]
    paths:
      - 'src/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [ "master", "main" ]
    paths:
      - 'src/**'
      - '.github/workflows/backend-ci.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x
        cache: true
        cache-dependency-path: src/SmartPole.Inventory.sln

    - name: Restore dependencies
      working-directory: src
      run: dotnet restore SmartPole.Inventory.sln

    - name: Check Formatting
      working-directory: src
      run: dotnet format SmartPole.Inventory.sln --verify-no-changes --severity warn || true

    - name: Build
      working-directory: src
      run: dotnet build SmartPole.Inventory.sln --no-restore --configuration Release

    - name: Test Unit Tests
      working-directory: src
      run: dotnet test SmartPole.Inventory.UnitTests/SmartPole.Inventory.UnitTests.csproj --no-build --configuration Release --verbosity normal

    - name: Publish WebAPI
      working-directory: src
      run: dotnet publish SmartPole.Inventory.WebAPI/SmartPole.Inventory.WebAPI.csproj --configuration Release --no-build --output ./publish

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: backend-app
        path: src/publish
